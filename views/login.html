<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SmartFactory</title>
    <link rel="stylesheet" href="../css/css_components/pages/Login.css">
</head>

<body>
    <div class="container-principal">
        <div class="lado-logo">
            <img src="../img/fundo2.jpg" alt="SmartFactory Logo">
        </div>

        <div class="lado-login">
            <div class="login-card">
                <div class="form-box" id="loginBox">
                    <img src="../img/Logo.png" alt="logo do login">

                    <h2 class="bem-vindo">Seja bem-vindo</h2>

                    <input type="text" placeholder="Usuário ou Email" id="usuario">
                    <input type="password" placeholder="Senha" id="senha">

                    <div class="options">
                        <p id="esqueciSenha" style="cursor:pointer; color:#114fa8;">
                            Esqueci a senha
                        </p>
                    </div>

                    <button id="botaoLogin" type="button">LOGIN</button>
                </div>

                <!-- 🔥 NOVA TELA -->
                <div class="form-box" id="recuperarBox" style="display:none; text-align:center;">
                    <img src="../img/Logo.png" alt="logo do login">

                    <h2 class="bem-vindo">Recuperar acesso</h2>

                    <p style="margin:20px 0;">
                        ⚠️ Para recuperar sua senha,<br>
                        entre em contato com o administrador do sistema.
                    </p>

                    <button id="btnVoltar" type="button">VOLTAR</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="../../js/components/auth.js"></script>
    <script src="../js/pages/Login.js"></script>
</body>

</html>
