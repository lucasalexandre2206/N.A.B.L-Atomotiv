<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Divergências</title>
    <link rel="stylesheet" href="../../css/css_components/pages/divergencias.css">
    <link rel="stylesheet" href="/css/css_components/sidebar.css">
</head>

<body>
    <div id="sidebar-container"></div>
    <div id="navbar-container"></div>

    <div class="container">
        <div id="sidebar"></div>

        <div class="main">
            <h1>Divergências de produção</h1>

            <div class="card-geral">

                <div class="card">
                    <div class="titulo-card">
                        <p>Divergências Hoje</p>
                    </div>

                    <div class="card-info">
                        <p class="card-info-qtd" id="divHoje">0</p>
                    </div>
                </div>

                <div class="card">
                    <div class="titulo-card">
                        <p>Divergências</p>
                    </div>

                    <div class="card-info">
                        <p class="card-info-qtd" id="criticas">0</p>
                    </div>
                </div>

                <div class="card">
                    <div class="titulo-card">
                        <p>Máquinas com erro</p>
                    </div>

                    <div class="card-info">
                        <p class="card-info-qtd" id="maqErro">0</p>
                    </div>
                </div>

                <div class="card">
                    <div class="titulo-card">
                        <p>Peças divergentes</p>
                    </div>

                    <div class="card-info">
                        <p class="card-info-qtd" id="pecas">0</p>
                    </div>
                </div>

            </div>

            <p class="titulo">Alerta de Divergências</p>
            <div class="alerta" id="alertaTexto">
                Nenhuma divergência crítica no momento.
            </div>

            <p class="titulo1">Filtros</p>
            <div class="filtros">
                <input type="date" id="filtroData">
                <input type="text" id="filtroMaquina" placeholder="Máquina">
                <select id="filtroStatus">
                    <option value="">Todos</option>
                    <option value="aberta">🔴 Aberta</option>
                    <option value="resolvida">🟢 Resolvida</option>
                </select>
                <input type="text" id="filtroProduto" placeholder="Produto">
                <button type="button" onclick="filtrar()">Filtrar</button>
                <button type="button" onclick="limparFiltros()">Limpar</button>
            </div>

            <p class="titulo2">Tabela de Dados</p>
            <div class="tabela">
                <table>
                    <thead>
                        <tr>
                            <th>Data</th>
                            <th>Máquina</th>
                            <th>Produto</th>
                            <th>Status</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaDados"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="../../js/components/auth.js"></script>
    <script src="../../js/pages/divergencias.js"></script>
    <script src="/js/components/sidebar.js"></script>
    <script src="../../js/components/loadSidebar.js"></script>
    <script src="/js/components/loadNavbar.js"></script>

</body>

</html>
